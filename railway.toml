[build]
builder = "NIXPACKS"
buildCommand = "npm run railway:prepare"

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Use path only — not a full URL (dashboard mistakes cause GET /https://.../api/health).
healthcheckPath = "/api/health"
healthcheckTimeout = 120
